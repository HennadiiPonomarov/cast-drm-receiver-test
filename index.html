<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SWEET Cast Lab Receiver</title>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0d1820;
      }

      cast-media-player {
        --background: #0d1820;
        --background-color: #0d1820;
        --logo-background: #0d1820;
        --logo-color: #20c5c9;
        --splash-background: #0d1820;
        --splash-color: #0d1820;
        --progress-color: #20c5c9;
        --watermark-color: #f4f8fa;
        --font-family: Arial, sans-serif;
        --theme-hue: 183;
      }

      #receiver-loading {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: #0d1820;
        color: #f4f8fa;
        font: 600 32px/1 Arial, sans-serif;
        letter-spacing: 0;
        opacity: 0;
        visibility: hidden;
        transition: opacity 180ms ease, visibility 180ms ease;
        pointer-events: none;
      }

      #receiver-loading.visible {
        opacity: 1;
        visibility: visible;
      }

      #receiver-loading-brand {
        color: #f4f8fa;
      }

      #receiver-loading-brand span {
        color: #20c5c9;
      }

      #receiver-loading-spinner {
        width: 38px;
        height: 38px;
        border: 3px solid rgba(244, 248, 250, 0.18);
        border-top-color: #20c5c9;
        border-radius: 50%;
        animation: receiver-spin 720ms linear infinite;
      }

      @keyframes receiver-spin {
        to {
          transform: rotate(360deg);
        }
      }

      #receiver-status {
        position: fixed;
        right: 4vw;
        bottom: 4vh;
        max-width: 62vw;
        padding: 0.7em 1em;
        border-radius: 6px;
        background: rgba(13, 24, 32, 0.86);
        color: #f4f8fa;
        font: 500 22px/1.3 Arial, sans-serif;
        opacity: 0;
        transition: opacity 180ms ease;
        pointer-events: none;
        z-index: 10;
      }

      #receiver-status.visible {
        opacity: 1;
      }
    </style>
    <script defer src="receiver.js"></script>
  </head>
  <body>
    <cast-media-player></cast-media-player>
    <div id="receiver-loading" class="visible" aria-hidden="true">
      <div id="receiver-loading-brand"><span>sweet</span>.tv</div>
      <div id="receiver-loading-spinner"></div>
    </div>
    <div id="receiver-status" role="status" aria-live="polite"></div>
  </body>
</html>
