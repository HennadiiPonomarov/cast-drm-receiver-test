<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SWEET Cast Lab Receiver</title>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0d1820;
      }

      cast-media-player {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        --background: #000;
        --background-color: #000;
        --background-image: none;
        /* CAF shows this mark only in its controls/idle UI, never over video. */
        --logo-background: transparent;
        --logo-color: transparent;
        --logo-image: url('assets/sweet-tv-logo-light.svg');
        --logo-size: 360px auto;
        --splash-background: #000;
        --splash-color: #000;
        --splash-image: url('assets/sweet-tv-logo-light.svg');
        --splash-size: 360px auto;
        --font-family: Arial, sans-serif;
        --theme-hue: 185;
        --progress-color: #20c5c9;
      }

      #receiver-loading {
        /* CAF already renders content metadata while a stream starts. Keep
           the custom receiver free of a second, duplicate loading panel. */
        display: none !important;
      }

      #receiver-loading.visible {
        opacity: 1;
        visibility: visible;
      }

      #receiver-loading-brand {
        display: flex;
        align-items: center;
        width: min(58vw, 820px);
        min-height: 128px;
        padding: 18px 22px;
        box-sizing: border-box;
        background: rgba(13, 24, 32, 0.94);
        border-left: 4px solid #20c5c9;
        color: #f4f8fa;
      }

      #receiver-loading-artwork {
        display: none;
        flex: 0 0 62px;
        width: 62px;
        height: 92px;
        margin-right: 18px;
        object-fit: cover;
        background: #182b36;
      }

      #receiver-loading-title {
        overflow: hidden;
        color: #f4f8fa;
        font-size: 30px;
        font-weight: 600;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #receiver-loading-title::after {
        display: inline-block;
        width: 8px;
        height: 8px;
        margin-left: 14px;
        border-radius: 50%;
        background: #20c5c9;
        content: '';
        vertical-align: middle;
      }

      #receiver-status {
        position: fixed;
        right: 4vw;
        bottom: 4vh;
        max-width: 62vw;
        padding: 0.7em 1em;
        border-radius: 6px;
        background: rgba(13, 24, 32, 0.86);
        color: #f4f8fa;
        font: 500 22px/1.3 Arial, sans-serif;
        opacity: 0;
        transition: opacity 180ms ease;
        pointer-events: none;
        z-index: 10;
      }

      #receiver-status.visible {
        opacity: 1;
      }
    </style>
    <script defer src="receiver.js?v=clean-branded-receiver-8"></script>
  </head>
  <body>
    <cast-media-player></cast-media-player>
    <div id="receiver-loading" class="visible" aria-hidden="true">
      <div id="receiver-loading-brand">
        <img id="receiver-loading-artwork" alt="">
        <div id="receiver-loading-title">SWEET.TV</div>
      </div>
    </div>
    <div id="receiver-status" role="status" aria-live="polite"></div>
  </body>
</html>
